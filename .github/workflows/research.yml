name: research

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      topic:
        description: "What to research (free text; steering hints go here)"
        required: true
        type: string
      depth:
        description: "recon = one-page decision · survey = 2-4 pages · expedition = all angles"
        required: true
        default: survey
        type: choice
        options: [recon, survey, expedition]
permissions:
  issues: write
  contents: read

concurrency:
  group: research-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  sharpen-on-open:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER') &&
      (startsWith(github.event.issue.title, '[research] ') ||
       contains(github.event.issue.labels.*.name, 'scout-research'))
    runs-on: [self-hosted, scout]
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_BODY: ${{ github.event.issue.body }}
    steps:
      - uses: actions/checkout@v5
      - name: Ensure scout-research label exists
        run: |
          gh label create scout-research \
            --color c2410c \
            --description "Scout research request" \
            --repo "$GH_REPO" 2>/dev/null || true
      - name: Sharpen and post proposal
        run: |
          set -euo pipefail
          source scripts/lib-issue-parse.sh
          parse_issue_body "$ISSUE_BODY"
          if [ "$SKIP_SHARPEN" = "true" ]; then
            SHARPENED_TOPIC="$RAW_TOPIC"
            COMMENT_HEADER="Confirm research"
          else
            SHARPENED_TOPIC="$(RAW_TOPIC="$RAW_TOPIC" DEPTH="$DEPTH" \
                                 bash scripts/sharpen.sh)"
            COMMENT_HEADER="Sharpened proposal"
          fi
          ISSUE_NUMBER="$ISSUE_NUMBER" SHARPENED_TOPIC="$SHARPENED_TOPIC" \
            DEPTH="$DEPTH" COMMENT_HEADER="$COMMENT_HEADER" \
            bash scripts/issue-comment.sh

  resharpen-on-comment:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER') &&
      github.event.comment.user.type != 'Bot' &&
      (startsWith(github.event.issue.title, '[research] ') ||
       contains(github.event.issue.labels.*.name, 'scout-research')) &&
      github.event.issue.state == 'open' &&
      !startsWith(github.event.comment.body, '/')
    runs-on: [self-hosted, scout]
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      USER_FEEDBACK: ${{ github.event.comment.body }}
    steps:
      - uses: actions/checkout@v5
      - name: Re-sharpen with user feedback
        run: |
          set -euo pipefail
          source scripts/lib-issue-parse.sh
          parse_issue_body "$ISSUE_BODY"
          PREVIOUS_BODY="$(gh issue view "$ISSUE_NUMBER" --repo "$GH_REPO" \
              --json comments \
              --jq '[.comments[] | select(.author.login == "github-actions[bot]")] | last | .body')"

          PREVIOUS_SHARPENED="$(printf '%s' "$PREVIOUS_BODY" | awk '
            /^```scout-topic[[:space:]]*$/ { in_block=1; next }
            /^```[[:space:]]*$/ && in_block { exit }
            in_block { print }
          ')"

          PREVIOUS_SUB_TOPICS="$(printf '%s' "$PREVIOUS_BODY" | awk '
            /^### Sub-topics[[:space:]]*$/ { in_section=1; next }
            /^### / && in_section { exit }
            in_section { print }
          ' | sed -e :a -e '/^[[:space:]]*$/{$d;N;ba' -e '}')"

          SHARPENED_TOPIC="$(RAW_TOPIC="$RAW_TOPIC" DEPTH="$DEPTH" \
                             PREVIOUS_SHARPENED="$PREVIOUS_SHARPENED" \
                             PREVIOUS_SUB_TOPICS="$PREVIOUS_SUB_TOPICS" \
                             USER_FEEDBACK="$USER_FEEDBACK" \
                             bash scripts/sharpen.sh)"
          ISSUE_NUMBER="$ISSUE_NUMBER" SHARPENED_TOPIC="$SHARPENED_TOPIC" \
            DEPTH="$DEPTH" \
            COMMENT_HEADER="Sharpened proposal (revised)" \
            bash scripts/issue-comment.sh

  research:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER') &&
      github.event.comment.user.type == 'Bot' &&
      (contains(github.event.changes.body.from, '- [ ] **Start research**') ||
       contains(github.event.changes.body.from, '- [ ] **Research as one expedition instead**')) &&
      (contains(github.event.comment.body, '- [x] **Start research**') ||
       contains(github.event.comment.body, '- [X] **Start research**') ||
       contains(github.event.comment.body, '- [x] **Research as one expedition instead**') ||
       contains(github.event.comment.body, '- [X] **Research as one expedition instead**'))
    runs-on: [self-hosted, scout]
    timeout-minutes: 270
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BOT_COMMENT_BODY: ${{ github.event.comment.body }}
      ATLAS_REPO: git@github.com-atlas:${{ vars.ATLAS_REPO_OWNER || github.repository_owner }}/${{ vars.ATLAS_REPO_NAME || 'Atlas' }}.git
      GIT_AUTHOR_NAME: ${{ github.event.issue.user.login }}
      GIT_AUTHOR_EMAIL: ${{ github.event.issue.user.id }}+${{ github.event.issue.user.login }}@users.noreply.github.com
      GIT_COMMITTER_NAME: ${{ github.event.issue.user.login }}
      GIT_COMMITTER_EMAIL: ${{ github.event.issue.user.id }}+${{ github.event.issue.user.login }}@users.noreply.github.com
    steps:
      - name: Post run-started comment
        run: |
          JOB_ID=$(gh api "repos/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}/jobs" \
            --jq ".jobs[] | select(.name == \"${GITHUB_JOB}\") | .id")
          RUN_URL="https://github.com/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}/job/${JOB_ID}"
          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body "Research started! :tada:

          Details: $RUN_URL"
      - uses: actions/checkout@v5
      - name: Run research from issue
        run: bash scripts/research-from-issue.sh
      - name: Summary
        if: always()
        run: |
          {
            echo "## Research run"
            echo ""
            echo "- **Issue:** #${ISSUE_NUMBER}"
            echo "- **Atlas:** see Issue #${ISSUE_NUMBER} for the published link"
          } >> "$GITHUB_STEP_SUMMARY"

  views:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER') &&
      github.event.comment.user.type == 'Bot' &&
      contains(github.event.comment.body, '<!-- scout-view-targets-start -->') &&
      contains(github.event.changes.body.from, '- [ ] **Start creating the HTML pages**') &&
      (contains(github.event.comment.body, '- [x] **Start creating the HTML pages**') ||
       contains(github.event.comment.body, '- [X] **Start creating the HTML pages**'))
    runs-on: [self-hosted, scout]
    timeout-minutes: 270
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BOT_COMMENT_BODY: ${{ github.event.comment.body }}
      BOT_COMMENT_ID: ${{ github.event.comment.id }}
      ATLAS_REPO: git@github.com-atlas:${{ vars.ATLAS_REPO_OWNER || github.repository_owner }}/${{ vars.ATLAS_REPO_NAME || 'Atlas' }}.git
      GIT_AUTHOR_NAME: ${{ github.event.issue.user.login }}
      GIT_AUTHOR_EMAIL: ${{ github.event.issue.user.id }}+${{ github.event.issue.user.login }}@users.noreply.github.com
      GIT_COMMITTER_NAME: ${{ github.event.issue.user.login }}
      GIT_COMMITTER_EMAIL: ${{ github.event.issue.user.id }}+${{ github.event.issue.user.login }}@users.noreply.github.com
    steps:
      - uses: actions/checkout@v5
      - name: Dispatch view-author agents
        run: bash scripts/views-dispatch.sh
      - name: Summary
        if: always()
        run: |
          {
            echo "## Views run"
            echo ""
            echo "- **Issue:** #${ISSUE_NUMBER}"
          } >> "$GITHUB_STEP_SUMMARY"

  research-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, scout]
    timeout-minutes: 270
    env:
      TOPIC: ${{ inputs.topic }}
      DEPTH: ${{ inputs.depth }}
      ATLAS_REPO: git@github.com-atlas:${{ vars.ATLAS_REPO_OWNER || github.repository_owner }}/${{ vars.ATLAS_REPO_NAME || 'Atlas' }}.git
      GIT_AUTHOR_NAME: ${{ github.actor }}
      GIT_AUTHOR_EMAIL: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
      GIT_COMMITTER_NAME: ${{ github.actor }}
      GIT_COMMITTER_EMAIL: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
    steps:
      - uses: actions/checkout@v5
      - name: Run research (dispatch)
        run: bash scripts/run.sh
      - name: Summary
        if: always()
        run: |
          {
            echo "## Research run (dispatch)"
            echo ""
            echo "- **Topic:** ${TOPIC}"
            echo "- **Depth:** ${DEPTH}"
          } >> "$GITHUB_STEP_SUMMARY"
