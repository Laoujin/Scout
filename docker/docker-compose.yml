services:
  scout-runner:
    build: .
    image: scout-runner:latest
    container_name: scout-runner
    restart: unless-stopped
    environment:
      RUNNER_URL: ${RUNNER_URL:?Set RUNNER_URL in .env — e.g. https://github.com/<you>/Scout}
      RUNNER_TOKEN: ${RUNNER_TOKEN:?Set RUNNER_TOKEN in .env}
      RUNNER_LABELS: scout
      RUNNER_NAME: nas-scout
      ATLAS_REPO: ${ATLAS_REPO:?Set ATLAS_REPO in .env — e.g. git@github.com-atlas:<you>/Atlas.git}
    volumes:
      - claude-auth:/home/runner/.claude
      - runner-config:/home/runner/actions-runner
      - atlas-ssh:/home/runner/.ssh
      - ${SCOUT_PROFILE_HOST:-../profile.yml}:/home/runner/.scout/profile.yml:ro

  # Runner dedicated to the short sharpen jobs. Keeps sharpening responsive while
  # a long-running research occupies the main `scout` runner. Its own config
  # volume + name (a runner registration is 1 job at a time); shares Claude auth,
  # and mounts atlas-ssh read-only only to skip the first-boot deploy-key prompt
  # (sharpen never pushes to Atlas).
  scout-runner-sharpener:
    build: .
    image: scout-runner:latest
    container_name: scout-runner-sharpener
    restart: unless-stopped
    environment:
      RUNNER_URL: ${RUNNER_URL:?Set RUNNER_URL in .env — e.g. https://github.com/<you>/Scout}
      RUNNER_TOKEN: ${RUNNER_TOKEN_SHARPENER:?Set RUNNER_TOKEN_SHARPENER in .env}
      RUNNER_LABELS: scout-sharpener
      RUNNER_NAME: nas-scout-sharpener
      ATLAS_REPO: ${ATLAS_REPO:?Set ATLAS_REPO in .env — e.g. git@github.com-atlas:<you>/Atlas.git}
    volumes:
      - claude-auth:/home/runner/.claude
      - runner-config-sharpener:/home/runner/actions-runner
      - atlas-ssh:/home/runner/.ssh:ro
      - ${SCOUT_PROFILE_HOST:-../profile.yml}:/home/runner/.scout/profile.yml:ro

volumes:
  claude-auth:
  runner-config:
  runner-config-sharpener:
  atlas-ssh:
    name: scout_atlas-ssh
