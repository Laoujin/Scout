<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Research agents in 2026">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#ede6d3"/>
    </linearGradient>
    <radialGradient id="hub3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="node3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>

  <g transform="translate(300 200)">
    <!-- orbits -->
    <circle r="180" fill="none" stroke="#6d28d9" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="2 6"/>
    <circle r="140" fill="none" stroke="#c2410c" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="3 5"/>
    <circle r="95"  fill="none" stroke="#6d28d9" stroke-opacity="0.22" stroke-width="1.2"/>

    <!-- connections -->
    <line x1="0" y1="0" x2="-130" y2="-55" stroke="#6d28d9" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="0" y1="0" x2="110"  y2="-85" stroke="#6d28d9" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="0" y1="0" x2="150"  y2="65"  stroke="#c2410c" stroke-opacity="0.35" stroke-width="1"/>
    <line x1="0" y1="0" x2="-100" y2="120" stroke="#6d28d9" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="-130" y1="-55" x2="110" y2="-85" stroke="#6d28d9" stroke-opacity="0.18" stroke-width="0.8" stroke-dasharray="2 3"/>
    <line x1="150" y1="65" x2="-100" y2="120" stroke="#c2410c" stroke-opacity="0.15" stroke-width="0.8" stroke-dasharray="2 3"/>

    <!-- outer nodes -->
    <circle cx="-130" cy="-55" r="16" fill="url(#node3)" opacity="0.9"/>
    <circle cx="110"  cy="-85" r="18" fill="url(#node3)" opacity="0.9"/>
    <circle cx="150"  cy="65"  r="14" fill="#c2410c" opacity="0.85"/>
    <circle cx="-100" cy="120" r="20" fill="url(#node3)" opacity="0.85"/>
    <circle cx="40"   cy="155" r="10" fill="#6d28d9" opacity="0.6"/>
    <circle cx="-170" cy="40"  r="8"  fill="#6d28d9" opacity="0.55"/>

    <!-- hub -->
    <circle r="44" fill="url(#hub3)"/>
    <circle r="22" fill="#fef3ec" opacity="0.85"/>
    <circle r="10" fill="#c2410c"/>
  </g>
</svg>
