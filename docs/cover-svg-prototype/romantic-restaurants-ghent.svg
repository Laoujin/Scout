<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Romantic restaurants in Ghent">
  <defs>
    <radialGradient id="glow2" cx="0.5" cy="0.55" r="0.65">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4c1d1d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="0.5" cy="0.6" r="0.9">
      <stop offset="0" stop-color="#5c2a1a"/>
      <stop offset="1" stop-color="#1a0e0e"/>
    </radialGradient>
    <linearGradient id="plate2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef7e9"/>
      <stop offset="1" stop-color="#d6a56d"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  <ellipse cx="300" cy="210" rx="300" ry="190" fill="url(#glow2)"/>

  <!-- left plate -->
  <g transform="translate(180 250)">
    <circle r="92" fill="url(#plate2)" opacity="0.92"/>
    <circle r="58" fill="#3a1818" opacity="0.45"/>
    <circle r="10" cx="-8" cy="-12" fill="#be185d" opacity="0.85"/>
    <circle r="7" cx="12" cy="5" fill="#be185d" opacity="0.7"/>
    <circle r="5" cx="-2" cy="14" fill="#c2410c" opacity="0.85"/>
  </g>

  <!-- right plate -->
  <g transform="translate(430 220)">
    <circle r="102" fill="url(#plate2)" opacity="0.88"/>
    <circle r="66" fill="#3a1818" opacity="0.4"/>
    <circle r="8" cx="10" cy="-6" fill="#c2410c" opacity="0.9"/>
    <circle r="6" cx="-14" cy="10" fill="#be185d" opacity="0.85"/>
    <circle r="4" cx="20" cy="14" fill="#fbbf24" opacity="0.9"/>
  </g>

  <!-- wine flute silhouette -->
  <g transform="translate(290 90)" opacity="0.85">
    <path d="M-12 0 Q-12 38 0 52 Q12 38 12 0 Z" fill="#be185d"/>
    <rect x="-3" y="52" width="6" height="48" fill="#78350f"/>
    <ellipse cx="0" cy="102" rx="18" ry="4" fill="#78350f"/>
  </g>

  <!-- subtle floating sparks -->
  <g opacity="0.6">
    <circle cx="100" cy="80" r="2" fill="#fbbf24"/>
    <circle cx="500" cy="60" r="1.5" fill="#fbbf24"/>
    <circle cx="520" cy="120" r="2" fill="#fbbf24"/>
    <circle cx="80" cy="180" r="1.5" fill="#fbbf24"/>
  </g>
</svg>
