<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Static site generators in 2026">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f2"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
    <linearGradient id="page1-rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <pattern id="grid1" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 L 0 24" fill="none" stroke="#c2410c" stroke-opacity="0.06" stroke-width="0.6"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)"/>
  <rect width="600" height="400" fill="url(#grid1)"/>

  <!-- back sheet: teal-accent -->
  <g transform="translate(220 90) rotate(-6)">
    <rect width="240" height="290" rx="5" fill="#0e7490" opacity="0.22"/>
  </g>

  <!-- middle sheet: cream -->
  <g transform="translate(190 80) rotate(2)">
    <rect width="260" height="310" rx="5" fill="#fdf6ea" stroke="#c2410c" stroke-opacity="0.25" stroke-width="1.2"/>
    <rect x="28" y="40" width="140" height="6" rx="3" fill="#c2410c" opacity="0.35"/>
    <rect x="28" y="60" width="180" height="4" rx="2" fill="#5c4a3a" opacity="0.22"/>
    <rect x="28" y="74" width="120" height="4" rx="2" fill="#5c4a3a" opacity="0.22"/>
    <rect x="28" y="110" width="204" height="110" rx="4" fill="#0e7490" opacity="0.10"/>
    <rect x="28" y="240" width="160" height="4" rx="2" fill="#5c4a3a" opacity="0.22"/>
    <rect x="28" y="254" width="130" height="4" rx="2" fill="#5c4a3a" opacity="0.22"/>
  </g>

  <!-- front sheet: rust hero -->
  <g transform="translate(140 120) rotate(-2)">
    <rect width="240" height="260" rx="5" fill="url(#page1-rust)"/>
    <rect x="28" y="32" width="132" height="5" rx="2.5" fill="#fdf6ea" opacity="0.85"/>
    <rect x="28" y="48" width="160" height="3.5" rx="1.75" fill="#fdf6ea" opacity="0.45"/>
    <rect x="28" y="60" width="110" height="3.5" rx="1.75" fill="#fdf6ea" opacity="0.45"/>
    <rect x="28" y="88" width="184" height="80" rx="3" fill="#fdf6ea" opacity="0.25"/>
    <rect x="28" y="184" width="140" height="3.5" rx="1.75" fill="#fdf6ea" opacity="0.45"/>
    <rect x="28" y="196" width="170" height="3.5" rx="1.75" fill="#fdf6ea" opacity="0.45"/>
    <rect x="28" y="208" width="100" height="3.5" rx="1.75" fill="#fdf6ea" opacity="0.45"/>
  </g>
</svg>
