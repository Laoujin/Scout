<svg width="1000" height="320" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" aria-label="Scout flow diagram">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf9f6"/>
    </linearGradient>
  </defs>
  <text x="310" y="28" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#8a8a8a" letter-spacing="1.2">YOU OPEN A GITHUB ISSUE</text>
  <line x1="310" y1="40" x2="310" y2="72" stroke="#c2410c" stroke-width="1.6" marker-end="url(#arr)"/>
  <g transform="translate(30, 80)">
    <rect width="560" height="220" rx="12" fill="url(#cardGrad)" stroke="#c2410c" stroke-width="1.5"/>
    <text x="24" y="26" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="1.2">SCOUT · YOUR HARDWARE</text>
    <g transform="translate(24, 42)">
      <rect width="512" height="74" rx="8" fill="#faf9f6" stroke="#e8e6e0"/>
      <text x="18" y="22" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#c2410c" font-weight="700" letter-spacing="1.2">01 · SHARPEN</text>
      <text x="18" y="45" font-family="system-ui" font-size="13" fill="#1a1a1a" font-weight="600">Bot proposes a sharpened topic</text>
      <text x="18" y="63" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#5c5c5c">tick ✓ · reply to revise · uses your profile · subtopics if wide</text>
      <path d="M 444 20 A 18 18 0 1 0 444 56" stroke="#c2410c" stroke-width="1.3" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
      <text x="480" y="42" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#8a8a8a">revise</text>
    </g>
    <line x1="280" y1="122" x2="280" y2="134" stroke="#c2410c" stroke-width="1.4" marker-end="url(#arr)"/>
    <g transform="translate(24, 138)">
      <rect width="512" height="74" rx="8" fill="#faf9f6" stroke="#e8e6e0"/>
      <text x="18" y="22" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#c2410c" font-weight="700" letter-spacing="1.2">02 · RESEARCH</text>
      <text x="18" y="45" font-family="system-ui" font-size="13" fill="#1a1a1a" font-weight="600">Claude Code researches &amp; cites every claim</text>
      <text x="18" y="63" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#5c5c5c">WebSearch · WebFetch · Playwright · 5–30 min</text>
    </g>
  </g>
  <line x1="595" y1="190" x2="650" y2="190" stroke="#c2410c" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="623" y="180" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#8a8a8a">git push</text>
  <g transform="translate(660, 80)">
    <rect width="310" height="220" rx="12" fill="url(#cardGrad)" stroke="#e8e6e0"/>
    <text x="24" y="26" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="1.2">ATLAS · GITHUB PAGES</text>
    <g transform="translate(24, 42)">
      <rect width="262" height="74" rx="8" fill="#faf9f6" stroke="#e8e6e0"/>
      <text x="18" y="22" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#c2410c" font-weight="700" letter-spacing="1.2">03 · BUILD</text>
      <text x="18" y="45" font-family="system-ui" font-size="13" fill="#1a1a1a" font-weight="600">GitHub Pages rebuilds</text>
      <text x="18" y="63" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#5c5c5c">Jekyll · markdown or HTML views</text>
    </g>
    <line x1="155" y1="122" x2="155" y2="134" stroke="#c2410c" stroke-width="1.4" marker-end="url(#arr)"/>
    <g transform="translate(24, 138)">
      <rect width="262" height="74" rx="8" fill="#c2410c" stroke="#c2410c"/>
      <text x="18" y="22" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#fef3ec" font-weight="700" letter-spacing="1.2">04 · PUBLISH</text>
      <text x="18" y="45" font-family="system-ui" font-size="13" fill="#fff" font-weight="700">You read at your URL</text>
      <text x="18" y="63" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#fef3ec" opacity=".85">laoujin.github.io/Atlas/</text>
    </g>
  </g>
</svg>
